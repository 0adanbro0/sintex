version: '3.8'

services:
  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "3000:3000"
    # Добавьте эти две строки:
    env_file:
      - .env 

  frontend:
    build: ./
    container_name: frontend_app
    ports:
      - "5173:5173"
    depends_on:
      - backend


networks:
  app-network:
    driver: bridge